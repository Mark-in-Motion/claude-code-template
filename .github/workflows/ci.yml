name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Node.js job — uncomment and adapt if using Node.js
  node:
    name: Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Adapt this step to your stack.
      # No tests yet? Replace with: npm run build
      # Vite/React project? Use: npm run build
      - name: Test
        run: npm test

  # Python job — uncomment and adapt if using Python
