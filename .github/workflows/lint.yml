name: Lint

# Runs on every push to every branch for fast feedback on feature branches.
# Keep this fast — linting only, no tests.

on:
  push:

jobs:
  # Node.js lint — uncomment if using Node.js
  lint-node:
    name: Lint (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

